<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compartilhe Arquivos</title>
  <style>
    :root {
      --bg: #0f0f11;
      --surface: #1a1a1e;
      --surface2: #232328;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --text: #f0eeec;
      --muted: #888882;
      --accent: #7f77dd;
      --accent-dim: rgba(127,119,221,0.12);
      --accent-hover: #9b95e8;
      --danger: #e24b4a;
      --success: #1d9e75;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 0.5px solid var(--border);
      background: var(--surface);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 18px; height: 18px; fill: #fff; }

    .auth-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 14px;
      background: transparent;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .auth-btn:hover { background: var(--surface2); }
    .auth-btn.active { border-color: var(--accent); color: var(--accent); }
    .auth-btn svg { width: 15px; height: 15px; }

    /* ── MAIN ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    /* ── CONFIG PANEL ── */
    #config-panel {
      background: var(--surface);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    #config-panel h2 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 11px;
    }
    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 600px) { .config-grid { grid-template-columns: 1fr; } }
    .field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .field input {
      width: 100%;
      background: var(--bg);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 9px 12px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--muted); }
    .save-btn {
      margin-top: 14px;
      padding: 9px 20px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .save-btn:hover { background: var(--accent-hover); }
    .save-btn:active { transform: scale(0.98); }

    /* ── UPLOAD ZONE ── */
    #drop-zone {
      border: 1.5px dashed var(--border2);
      border-radius: var(--radius);
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 2rem;
      position: relative;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    #drop-zone input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-icon {
      width: 48px; height: 48px;
      background: var(--surface2);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .upload-icon svg { width: 24px; height: 24px; stroke: var(--accent); fill: none; }
    #drop-zone h3 { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
    #drop-zone p { font-size: 13px; color: var(--muted); }
    .file-types {
      display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 14px;
    }
    .tag {
      font-size: 11px; padding: 3px 9px;
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: 99px;
      color: var(--muted);
    }

    /* ── UPLOAD QUEUE ── */
    #queue { margin-bottom: 2rem; display: none; }
    #queue h3 { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
    .queue-item {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 8px;
    }
    .qi-thumb {
      width: 40px; height: 40px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--surface2);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .qi-thumb img, .qi-thumb video { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
    .qi-thumb svg { width: 20px; height: 20px; stroke: var(--muted); fill: none; }
    .qi-info { flex: 1; min-width: 0; }
    .qi-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .qi-size { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .qi-progress {
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      margin-top: 6px;
      overflow: hidden;
    }
    .qi-progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      width: 0%;
      transition: width 0.2s;
    }
    .qi-status { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .qi-status.done { color: var(--success); }
    .qi-status.error { color: var(--danger); }
    .qi-remove {
      background: none; border: none; cursor: pointer; color: var(--muted);
      padding: 4px; border-radius: 4px; line-height: 1; transition: color 0.15s;
    }
    .qi-remove:hover { color: var(--danger); }
    .qi-remove svg { width: 15px; height: 15px; stroke: currentColor; fill: none; }

    .upload-all-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 22px;
      background: var(--accent);
      border: none; border-radius: var(--radius-sm);
      color: #fff; font-size: 14px; font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 2rem;
    }
    .upload-all-btn:hover { background: var(--accent-hover); }
    .upload-all-btn:active { transform: scale(0.98); }
    .upload-all-btn:disabled { opacity: 0.5; cursor: default; }
    .upload-all-btn svg { width: 17px; height: 17px; stroke: #fff; fill: none; }

    /* ── GALLERY ── */
    #gallery-section h2 {
      font-size: 15px; font-weight: 500; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .gallery-count {
      font-size: 11px; padding: 2px 8px;
      background: var(--surface2);
      border-radius: 99px; color: var(--muted);
    }
    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .gallery-item {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
    }
    .gallery-item:hover { border-color: var(--border2); transform: translateY(-1px); }
    .gallery-thumb {
      width: 100%; height: 130px;
      object-fit: cover;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
    }
    .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-thumb video { width: 100%; height: 100%; object-fit: cover; }
    .gallery-thumb .file-icon { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .gallery-thumb .file-icon svg { width: 32px; height: 32px; stroke: var(--muted); fill: none; }
    .gallery-thumb .file-ext {
      font-size: 11px; text-transform: uppercase; color: var(--muted); font-weight: 600;
    }
    .gallery-meta { padding: 10px 12px; }
    .gallery-name {
      font-size: 12px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .gallery-size { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .gallery-actions {
      display: flex; gap: 6px; padding: 0 12px 10px;
    }
    .act-btn {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; padding: 5px 10px;
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: 6px; color: var(--text);
      cursor: pointer; text-decoration: none;
      transition: background 0.12s;
    }
    .act-btn:hover { background: var(--border); }
    .act-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; }
    .act-btn.del:hover { background: rgba(226,75,74,0.15); color: var(--danger); }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 999; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
    }
    #lightbox.open { display: flex; }
    #lightbox-close {
      position: absolute; top: 18px; right: 22px;
      background: none; border: none; color: #fff;
      font-size: 28px; cursor: pointer; opacity: 0.6;
      transition: opacity 0.15s;
    }
    #lightbox-close:hover { opacity: 1; }
    #lightbox-media { max-width: 90vw; max-height: 80vh; border-radius: var(--radius-sm); }
    #lightbox-filename { font-size: 13px; color: rgba(255,255,255,0.5); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
      background: var(--surface);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm);
      padding: 12px 20px;
      font-size: 13px;
      opacity: 0;
      transition: transform 0.25s, opacity 0.25s;
      z-index: 9999;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.success { border-color: var(--success); color: var(--success); }
    #toast.error { border-color: var(--danger); color: var(--danger); }

    /* ── EMPTY STATE ── */
    #empty-state {
      text-align: center; padding: 3rem 1rem; display: none;
    }
    #empty-state svg { width: 40px; height: 40px; stroke: var(--muted); fill: none; margin-bottom: 12px; }
    #empty-state p { color: var(--muted); font-size: 14px; }

    .section-divider {
      border: none; border-top: 0.5px solid var(--border);
      margin: 2rem 0;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M4 16l4-4 4 4 4-6 4 6"/><rect x="2" y="3" width="20" height="18" rx="2"/></svg>
    </div>
    Arquivos
  </div>
  <button class="auth-btn" id="admin-toggle" onclick="toggleAdmin()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    Modo admin
  </button>
</header>

<main>

  <!-- CONFIG PANEL (admin) -->
  <div id="config-panel" style="display:none">
    <h2>Configuração do repositório</h2>
    <div class="config-grid">
      <div class="field">
        <label>Usuário GitHub</label>
        <input type="text" id="gh-user" placeholder="seu-usuario" />
      </div>
      <div class="field">
        <label>Repositório</label>
        <input type="text" id="gh-repo" placeholder="seu-usuario.github.io" />
      </div>
      <div class="field">
        <label>Branch</label>
        <input type="text" id="gh-branch" placeholder="main" />
      </div>
      <div class="field">
        <label>Pasta de uploads</label>
        <input type="text" id="gh-folder" placeholder="uploads" />
      </div>
      <div class="field" style="grid-column:1/-1">
        <label>Personal Access Token (fica só no seu navegador)</label>
        <input type="password" id="gh-token" placeholder="ghp_..." />
      </div>
    </div>
    <button class="save-btn" onclick="saveConfig()">Salvar configuração</button>
  </div>

  <!-- DROP ZONE (admin) -->
  <div id="drop-zone" style="display:none" onclick="triggerInput()">
    <input type="file" id="file-input" multiple accept="*/*" onchange="handleFiles(this.files)" />
    <div class="upload-icon">
      <svg viewBox="0 0 24 24" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </div>
    <h3>Arraste arquivos aqui</h3>
    <p>ou clique para selecionar</p>
    <div class="file-types">
      <span class="tag">Fotos</span>
      <span class="tag">Vídeos</span>
      <span class="tag">PDFs</span>
      <span class="tag">Qualquer arquivo</span>
    </div>
  </div>

  <!-- QUEUE -->
  <div id="queue">
    <h3>Fila de envio</h3>
    <div id="queue-items"></div>
    <button class="upload-all-btn" id="upload-btn" onclick="uploadAll()">
      <svg viewBox="0 0 24 24" stroke-width="2">
        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      </svg>
      Enviar todos
    </button>
  </div>

  <hr class="section-divider" />

  <!-- GALLERY -->
  <section id="gallery-section">
    <h2>
      Arquivos compartilhados
      <span class="gallery-count" id="gallery-count">0</span>
    </h2>
    <div id="gallery"></div>
    <div id="empty-state">
      <svg viewBox="0 0 24 24" stroke-width="1.5">
        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
        <polyline points="13 2 13 9 20 9"/>
      </svg>
      <p>Nenhum arquivo ainda.<br>Configure o repositório e faça um envio.</p>
    </div>
  </section>
</main>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">×</button>
  <div id="lightbox-body"></div>
  <span id="lightbox-filename"></span>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── STATE ──
let config = {};
let pendingFiles = [];
let isAdmin = false;

const STORAGE_KEY = 'gh_share_config';

// ── INIT ──
(function init() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    config = JSON.parse(saved);
    applyConfigToForm();
    loadGallery();
  } else {
    showEmpty();
  }
})();

function applyConfigToForm() {
  document.getElementById('gh-user').value = config.user || '';
  document.getElementById('gh-repo').value = config.repo || '';
  document.getElementById('gh-branch').value = config.branch || 'main';
  document.getElementById('gh-folder').value = config.folder || 'uploads';
  document.getElementById('gh-token').value = config.token || '';
}

// ── ADMIN TOGGLE ──
function toggleAdmin() {
  isAdmin = !isAdmin;
  const btn = document.getElementById('admin-toggle');
  const panel = document.getElementById('config-panel');
  const dz = document.getElementById('drop-zone');

  if (isAdmin) {
    btn.classList.add('active');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Sair do admin`;
    panel.style.display = 'block';
    dz.style.display = 'block';
  } else {
    btn.classList.remove('active');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Modo admin`;
    panel.style.display = 'none';
    dz.style.display = 'none';
  }
}

// ── CONFIG ──
function saveConfig() {
  config = {
    user:   document.getElementById('gh-user').value.trim(),
    repo:   document.getElementById('gh-repo').value.trim(),
    branch: document.getElementById('gh-branch').value.trim() || 'main',
    folder: document.getElementById('gh-folder').value.trim() || 'uploads',
    token:  document.getElementById('gh-token').value.trim(),
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
  toast('Configuração salva!', 'success');
  loadGallery();
}

// ── DROP ZONE ──
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});

function triggerInput(e) {
  if (e && e.target === document.getElementById('file-input')) return;
  document.getElementById('file-input').click();
}

function handleFiles(files) {
  for (const f of files) pendingFiles.push(f);
  renderQueue();
}

function renderQueue() {
  const q = document.getElementById('queue');
  const items = document.getElementById('queue-items');
  if (pendingFiles.length === 0) { q.style.display = 'none'; return; }
  q.style.display = 'block';
  items.innerHTML = '';
  pendingFiles.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'queue-item';
    div.id = `qi-${i}`;
    const thumb = thumbFor(f);
    div.innerHTML = `
      <div class="qi-thumb" id="qi-thumb-${i}">${thumb}</div>
      <div class="qi-info">
        <div class="qi-name">${f.name}</div>
        <div class="qi-size">${fmtSize(f.size)}</div>
        <div class="qi-progress"><div class="qi-progress-bar" id="qi-prog-${i}"></div></div>
      </div>
      <span class="qi-status" id="qi-stat-${i}">Aguardando</span>
      <button class="qi-remove" onclick="removeQueued(${i})">
        <svg viewBox="0 0 24 24" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    `;
    items.appendChild(div);
    // preview
    if (f.type.startsWith('image/')) {
      const img = document.createElement('img');
      img.onload = () => URL.revokeObjectURL(img.src);
      img.src = URL.createObjectURL(f);
      document.getElementById(`qi-thumb-${i}`).innerHTML = '';
      document.getElementById(`qi-thumb-${i}`).appendChild(img);
    }
  });
}

function thumbFor(f) {
  if (f.type.startsWith('image/')) return '';
  if (f.type.startsWith('video/')) return `<svg viewBox="0 0 24 24" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`;
  if (f.type === 'application/pdf') return `<svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`;
  return `<svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
}

function removeQueued(i) {
  pendingFiles.splice(i, 1);
  renderQueue();
}

// ── UPLOAD ──
async function uploadAll() {
  if (!config.token) { toast('Configure o token primeiro.', 'error'); return; }
  const btn = document.getElementById('upload-btn');
  btn.disabled = true;

  for (let i = 0; i < pendingFiles.length; i++) {
    const f = pendingFiles[i];
    const stat = document.getElementById(`qi-stat-${i}`);
    const prog = document.getElementById(`qi-prog-${i}`);
    stat.textContent = 'Enviando…';
    prog.style.width = '30%';

    try {
      await uploadFile(f);
      prog.style.width = '100%';
      stat.textContent = 'Enviado ✓';
      stat.className = 'qi-status done';
    } catch (err) {
      stat.textContent = 'Erro';
      stat.className = 'qi-status error';
      console.error(err);
    }
  }

  btn.disabled = false;
  toast('Upload concluído!', 'success');
  pendingFiles = [];
  setTimeout(() => {
    document.getElementById('queue').style.display = 'none';
    loadGallery();
  }, 1200);
}

async function uploadFile(file) {
  const b64 = await toBase64(file);
  const path = `${config.folder}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g, '_')}`;
  const url = `https://api.github.com/repos/${config.user}/${config.repo}/contents/${path}`;

  const res = await fetch(url, {
    method: 'PUT',
    headers: {
      Authorization: `token ${config.token}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      message: `upload: ${file.name}`,
      content: b64,
      branch: config.branch,
    }),
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message);
  }
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// ── GALLERY ──
async function loadGallery() {
  const gallery = document.getElementById('gallery');
  const count = document.getElementById('gallery-count');

  if (!config.user || !config.repo) { showEmpty(); return; }

  const folder = config.folder || 'uploads';
  const branch = config.branch || 'main';
  const url = `https://api.github.com/repos/${config.user}/${config.repo}/contents/${folder}?ref=${branch}`;

  try {
    const res = await fetch(url, config.token ? { headers: { Authorization: `token ${config.token}` } } : {});
    if (!res.ok) { showEmpty(); return; }
    const files = await res.json();
    if (!Array.isArray(files) || files.length === 0) { showEmpty(); return; }

    document.getElementById('empty-state').style.display = 'none';
    gallery.innerHTML = '';
    count.textContent = files.length;

    for (const f of files) {
      const card = buildCard(f);
      gallery.appendChild(card);
    }
  } catch (e) {
    showEmpty();
  }
}

function buildCard(f) {
  const rawUrl = f.download_url;
  const ext = f.name.split('.').pop().toLowerCase();
  const isImage = /^(jpg|jpeg|png|gif|webp|svg|avif)$/.test(ext);
  const isVideo = /^(mp4|webm|ogg|mov)$/.test(ext);

  const card = document.createElement('div');
  card.className = 'gallery-item';

  let thumbHTML = '';
  if (isImage) {
    thumbHTML = `<div class="gallery-thumb"><img src="${rawUrl}" loading="lazy" alt="${f.name}" /></div>`;
  } else if (isVideo) {
    thumbHTML = `<div class="gallery-thumb"><video src="${rawUrl}" muted preload="metadata"></video></div>`;
  } else {
    const icon = extIcon(ext);
    thumbHTML = `<div class="gallery-thumb" style="color:var(--muted)"><div class="file-icon">${icon}<span class="file-ext">${ext}</span></div></div>`;
  }

  const delBtn = isAdmin
    ? `<button class="act-btn del" onclick="deleteFile('${f.path}', '${f.sha}', this.closest('.gallery-item'))"><svg viewBox="0 0 24 24" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>Apagar</button>`
    : '';

  card.innerHTML = `
    ${thumbHTML}
    <div class="gallery-meta">
      <div class="gallery-name">${f.name}</div>
      <div class="gallery-size">${fmtSize(f.size)}</div>
    </div>
    <div class="gallery-actions">
      <a class="act-btn" href="${rawUrl}" download="${f.name}" target="_blank">
        <svg viewBox="0 0 24 24" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Baixar
      </a>
      ${delBtn}
    </div>
  `;

  if (isImage || isVideo) {
    card.querySelector('.gallery-thumb').addEventListener('click', () => openLightbox(rawUrl, f.name, isVideo));
  }

  return card;
}

function extIcon(ext) {
  if (['pdf'].includes(ext)) return `<svg viewBox="0 0 24 24" stroke-width="1.5" style="width:32px;height:32px;stroke:var(--muted);fill:none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>`;
  if (['zip','rar','tar','gz'].includes(ext)) return `<svg viewBox="0 0 24 24" stroke-width="1.5" style="width:32px;height:32px;stroke:var(--muted);fill:none"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>`;
  return `<svg viewBox="0 0 24 24" stroke-width="1.5" style="width:32px;height:32px;stroke:var(--muted);fill:none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
}

async function deleteFile(path, sha, cardEl) {
  if (!confirm('Apagar este arquivo do repositório?')) return;
  try {
    const res = await fetch(`https://api.github.com/repos/${config.user}/${config.repo}/contents/${path}`, {
      method: 'DELETE',
      headers: { Authorization: `token ${config.token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `delete: ${path}`, sha, branch: config.branch }),
    });
    if (res.ok) {
      cardEl.remove();
      const cnt = document.getElementById('gallery-count');
      cnt.textContent = parseInt(cnt.textContent) - 1;
      toast('Arquivo apagado.', 'success');
    } else {
      toast('Erro ao apagar.', 'error');
    }
  } catch { toast('Erro ao apagar.', 'error'); }
}

// ── LIGHTBOX ──
function openLightbox(url, name, isVideo) {
  const body = document.getElementById('lightbox-body');
  body.innerHTML = isVideo
    ? `<video id="lightbox-media" src="${url}" controls autoplay></video>`
    : `<img id="lightbox-media" src="${url}" alt="${name}" />`;
  document.getElementById('lightbox-filename').textContent = name;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-body').innerHTML = '';
}
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});

// ── UTILS ──
function showEmpty() {
  document.getElementById('gallery').innerHTML = '';
  document.getElementById('gallery-count').textContent = '0';
  document.getElementById('empty-state').style.display = 'block';
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return Math.round(bytes / 1024) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  setTimeout(() => el.className = '', 2800);
}
</script>

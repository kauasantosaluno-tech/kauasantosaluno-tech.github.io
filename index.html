<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Acervo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">Acervo</a>
      <nav>
        <a href="index.html" class="nav-link active">Publicações</a>
        <a href="admin/index.html" class="nav-link nav-admin">Gerenciar</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Publicações</h1>
      <p class="hero-sub">Documentos, imagens e arquivos compartilhados.</p>
    </section>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">Todos</button>
      <button class="filter-btn" data-filter="pdf">PDF</button>
      <button class="filter-btn" data-filter="image">Imagens</button>
      <button class="filter-btn" data-filter="doc">Docs</button>
      <button class="filter-btn" data-filter="text">Texto</button>
      <button class="filter-btn" data-filter="other">Outros</button>
    </div>

    <div class="posts-grid" id="postsGrid">
      <!-- Posts are injected by JS from posts.json -->
    </div>

    <p class="empty-state" id="emptyState" style="display:none">
      Nenhuma publicação ainda. <a href="admin/index.html">Adicionar arquivos →</a>
    </p>
  </main>

  <!-- Preview Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <footer class="site-footer">
    <p>Acervo pessoal · <span id="footerYear"></span></p>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
